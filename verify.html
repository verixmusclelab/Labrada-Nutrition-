<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
}

#verifiedScreen,
#portalScreen{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

#portalScreen{
display:none;
}

.card{
background:#111;
padding:30px;
border-radius:25px;
width:100%;
max-width:400px;
text-align:center;
border:2px solid #ffcc00;
}

.brand{
font-size:32px;
font-weight:900;
color:#ffcc00;
margin-bottom:20px;
text-transform:uppercase;
}

.verify-text{
color:#00ff00;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ffcc00;
font-weight:bold;
font-size:15px;
cursor:pointer;
margin-top:15px;
}

.code-box{
background:#181818;
border:2px dashed #ffcc00;
padding:20px;
border-radius:15px;
margin:20px 0;
}

.verify-input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
font-size:16px;
text-align:center;
margin-top:10px;
}

#resultBox{
margin-top:20px;
font-weight:bold;
font-size:18px;
min-height:40px;
}

</style>
</head>

<body>

<!-- SCREEN 1 -->

<div id="verifiedScreen">

<div class="card">

<div class="brand" id="screenBrand">
LOADING...
</div>

<div style="font-size:65px;">✅</div>

<div class="verify-text">
PRODUCT VERIFIED
</div>

<button class="btn" onclick="openPortal()">
OPEN WEBSITE
</button>

</div>

</div>

<!-- SCREEN 2 -->

<div id="portalScreen">

<div class="card">

<div class="brand" id="portalBrand">
BRAND
</div>

<div class="code-box">

<div style="font-size:13px;color:#888;">
MANUAL VERIFICATION CODE
</div>

<div id="displayCode"
style="font-size:30px;font-weight:bold;color:#00ff00;margin-top:10px;">
---
</div>

</div>

<input type="text"
id="verifyInput"
class="verify-input"
placeholder="ENTER PRODUCT CODE">

<button class="btn"
onclick="verifyProduct()">
VERIFY PRODUCT
</button>

<div id="resultBox"></div>

</div>

</div>

<script>

const products = {

/* LABRADA */

"LBRA7X9K1":"LABRADA NUTRITION",

/* MUSCLETECH */

"PRE9W7K2":"MUSCLETECH",
"TRU5MP91":"MUSCLETECH",

/* ON */

"ON84P2X":"OPTIMUM NUTRITION",

/* GNC */

"GNC3M78B":"GNC",

/* WELLCORE */

"WEL7C91X":"WELLCORE",

/* AVVATAR */

"AVV7P9K2":"AVVATAR",

/* BIGMUSCLES */

"BIG7P2K8":"BIGMUSCLES"

};

let currentCode = "";

window.onload = function(){

const params =
new URLSearchParams(window.location.search);

const code =
params.get("code");

if(code && products[code.toUpperCase()]){

currentCode = code.toUpperCase();

const brand =
products[currentCode];

document.getElementById(
"screenBrand"
).innerText = brand;

document.getElementById(
"portalBrand"
).innerText = brand;

document.getElementById(
"displayCode"
).innerText = currentCode;

}

else{

document.getElementById(
"screenBrand"
).innerText =
"INVALID PRODUCT QR";

}

};

function openPortal(){

document.getElementById(
"verifiedScreen"
).style.display = "none";

document.getElementById(
"portalScreen"
).style.display = "flex";

}

function verifyProduct(){

let input =
document.getElementById(
"verifyInput"
);

let code =
input.value.trim().toUpperCase();

let box =
document.getElementById(
"resultBox"
);

if(products[code]){

let used =
parseInt(
localStorage.getItem(
"used_"+code
)
) || 0;

if(used >= 2){

box.innerHTML =
"⚠️ ALREADY USED";

box.style.color =
"#ffcc00";

}

else{

used++;

localStorage.setItem(
"used_"+code,
used
);

box.innerHTML =
"✅ VERIFIED<br>" +
products[code] +
"<br>Usage: " +
used +
"/2";

box.style.color =
"#00ff00";

}

}

else{

box.innerHTML =
"❌ INVALID CODE";

box.style.color =
"red";

}

input.value = "";
input.focus();

}

</script>

</body>
</html>
