<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0b0b;color:#fff}

#verifiedScreen,#portalScreen{min-height:100vh;display:flex;justify-content:center;align-items:center}

.card{
background:#111;
padding:30px;
border-radius:20px;
border:2px solid #ffcc00;
width:90%;
max-width:400px;
text-align:center;
}

.brand{
font-size:24px;
font-weight:bold;
color:#ffcc00;
margin-bottom:15px;
}

.btn{
width:100%;
padding:14px;
background:#ffcc00;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:10px;
margin-top:10px;
}

.code-box{
margin:20px 0;
padding:15px;
border:1px dashed #ffcc00;
border-radius:12px;
color:#00ff00;
}

input{
width:100%;
padding:12px;
text-align:center;
border-radius:10px;
margin-top:10px;
border:none;
}

#resultBox{margin-top:15px;font-weight:bold;}
</style>
</head>

<body>

<!-- SCAN SCREEN -->
<div id="verifiedScreen">
  <div class="card">
    <div class="brand" id="scanBrand">BRAND</div>
    <div style="font-size:50px">✅</div>
    <div style="color:#00ff00;font-weight:bold">PRODUCT VERIFIED</div>
    <button class="btn" onclick="openPortal()">OPEN WEBSITE</button>
  </div>
</div>

<!-- PORTAL -->
<div id="portalScreen" style="display:none;">
  <div class="card">
    
    <div class="brand" id="portalBrand">---</div>

    <div class="code-box">
      CODE: <span id="displayCode">---</span>
    </div>

    <input id="verifyInput" placeholder="Enter Code">
    <button class="btn" onclick="verifyProduct()">VERIFY</button>

    <div id="resultBox"></div>
  </div>
</div>

<script>
const products = {
  "LBR7F29K": { brand:"LABRADA NUTRITION" },
  "LMG5P62C": { brand:"LABRADA NUTRITION" },
  "TRU5MP91": { brand:"MUSCLETECH" },
  "PRE9W7K2": { brand:"MUSCLETECH" },
  "ON84P2X": { brand:"OPTIMUM NUTRITION" },
  "GNC3M78B": { brand:"GNC" },
  "MUL4V8T1": { brand:"GNC" }
};

window.onload = function(){
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  if(code && products[code.toUpperCase()]){
    let p = products[code.toUpperCase()];

    document.getElementById("scanBrand").innerText = p.brand;
    document.getElementById("portalBrand").innerText = p.brand;
    document.getElementById("displayCode").innerText = code.toUpperCase();
  }
};

function openPortal(){
  document.getElementById("verifiedScreen").style.display="none";
  document.getElementById("portalScreen").style.display="flex";
}

function verifyProduct(){
  let code = document.getElementById("verifyInput").value = "";
  let code = document.getElementById("verifyInput").focus();

  if(products[code]){
    box.innerHTML = "✅ VERIFIED - " + products[code].brand;
    box.style.color = "#00ff00";
  } else {
    box.innerHTML = "❌ INVALID CODE";
    box.style.color = "red";
  }
}
</script>

</body>
</html>
