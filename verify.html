*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0b0b;
color:#fff;
}

/* SCREENS */

#verifiedScreen,
#portalScreen{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

#portalScreen{
display:none;
}

/* CARD */

.card{
background:#111;
padding:30px;
border-radius:20px;
border:2px solid #ffcc00;
width:90%;
max-width:400px;
text-align:center;
}

/* BRAND */

.brand{
font-size:24px;
font-weight:bold;
color:#ffcc00;
margin-bottom:15px;
}

/* BUTTON */

.btn{
width:100%;
padding:14px;
background:#ffcc00;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:10px;
margin-top:10px;
}

/* CODE BOX */

.code-box{
margin:20px 0;
padding:15px;
border:1px dashed #ffcc00;
border-radius:12px;
color:#00ff00;
font-size:20px;
font-weight:bold;
}

/* INPUT */

input{
width:100%;
padding:12px;
text-align:center;
border-radius:10px;
margin-top:10px;
border:none;
font-size:16px;
}

/* RESULT */

#resultBox{
margin-top:15px;
font-weight:bold;
font-size:18px;
min-height:40px;
line-height:1.6;
}

</style>
</head>

/* QR AUTO DETECT */

window.onload = function(){

/* RESET SESSION */

sessionStorage.clear();

const params =
new URLSearchParams(window.location.search);

const code =
params.get("code");

/* VALID QR */

if(code && products[code.toUpperCase()]){

let p =
products[code.toUpperCase()];

/* BRAND */

document.getElementById("scanBrand")
.innerText = p.brand;

document.getElementById("portalBrand")
.innerText = p.brand;

/* CODE */

document.getElementById("displayCode")
.innerText = code.toUpperCase();

}

/* INVALID QR */

else{

document.getElementById("scanBrand")
.innerText = "INVALID PRODUCT QR";

}

};

/* OPEN WEBSITE */

function openPortal(){

document.getElementById("verifiedScreen")
.style.display = "none";

document.getElementById("portalScreen")
.style.display = "flex";

}

/* VERIFY PRODUCT */

function verifyProduct(){

let code =
document.getElementById("verifyInput")
.value
.trim()
.toUpperCase();

let box =
document.getElementById("resultBox");

/* VALID CODE */

if(products[code]){

let used =
parseInt(
sessionStorage.getItem("used_"+code)
) || 0;

/* LIMIT */

if(used >= 2){

box.innerHTML =
"⚠️ ALREADY USED";

box.style.color =
"#ffcc00";

}

/* VERIFIED */

else{

used++;

sessionStorage.setItem(
"used_"+code,
used
);

box.innerHTML =
"✅ VERIFIED<br><br>" +
products[code].brand +
"<br><br>" +
"Thank You For Choosing<br>" +
products[code].brand +
"<br><br>" +
"Usage: " + used + "/2";

box.style.color =
"#00ff00";

}

}

/* INVALID */

else{

box.innerHTML =
"❌ INVALID CODE";

box.style.color =
"red";

}

/* AUTO CLEAR */

document.getElementById("verifyInput")
.value = "";

}
