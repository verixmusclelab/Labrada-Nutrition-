<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#0b0b0b; color:white; min-height:100vh; }
        
        /* SCREEN 1: VERIFIED POPUP */
        #verifiedScreen { display:flex; justify-content:center; align-items:center; height:100vh; padding:20px; }
        .v-card { background:#111; padding:40px; border-radius:30px; width:100%; max-width:400px; text-align:center; border:2px solid #ffcc00; }
        
        /* SCREEN 2: PORTAL */
        #portalScreen { display:none; padding:40px 20px; }
        .p-card { background:#111; padding:30px; border-radius:20px; border:2px solid #ffcc00; max-width:400px; margin:auto; text-align:center; }
        
        .brand { font-size:26px; font-weight:bold; color:#ffcc00; margin-bottom:15px; }
        .code-box { background:#181818; border:2px dashed #ffcc00; padding:20px; border-radius:15px; margin:20px 0; }
        .verify-input { width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:15px; text-align:center; font-size:16px; }
        .btn { width:100%; padding:15px; border:none; border-radius:10px; background:#ffcc00; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<!-- SCREEN 1 -->
<div id="verifiedScreen">
    <div class="v-card">
        <div class="brand" id="s1Brand">BRAND NAME</div>
        <div style="font-size:60px;">✅</div>
        <div style="color:#00ff00; font-size:20px; font-weight:bold; margin:15px 0;">PRODUCT VERIFIED</div>
        <button class="btn" onclick="openPortal()">OPEN WEBSITE</button>
    </div>
</div>

<!-- SCREEN 2 -->
<div id="portalScreen">
    <div class="p-card">
        <div class="brand" id="s2Brand">BRAND NAME</div>
        <div class="code-box">
            <div style="font-size:12px; color:#888;">MANUAL VERIFICATION CODE</div>
            <div id="displayCode" style="font-size:24px; color:#00ff00; margin-top:10px;">---</div>
        </div>
        <input type="text" id="verifyInput" class="verify-input" placeholder="Enter Product Code">
        <button class="btn" onclick="verifyProduct()">VERIFY PRODUCT</button>
        <div id="resultBox" style="margin-top:15px;"></div>
    </div>
</div>

<!-- SUCCESS POPUP -->
<div id="successPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:1000;">
    <div class="v-card">
        <div class="brand" id="finalBrand">BRAND NAME</div>
        <div style="font-size:50px;">✅</div>
        <div style="color:#00ff00; font-weight:bold; margin:10px 0;">PRODUCT VERIFIED SUCCESSFULLY</div>
        <div style="font-size:14px; margin-bottom:20px;">Thank You for Choosing Us</div>
        <button class="btn" onclick="location.reload()">CLOSE</button>
    </div>
</div>

<script>
    const products = {
        "LBR7F29K": { brand: "LABRADA NUTRITION", product: "WHEY PROTEIN" },
        "LMG5P62C": { brand: "LABRADA NUTRITION", product: "" },
        "TRU5MP91": { brand: "MUSCLETECH", product: "NITRO TECH" },
        "ON84P2X": { brand: "OPTIMUM NUTRITION", product: "GOLD STANDARD WHEY" }
    };

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        if (code && products[code.toUpperCase()]) {
            let p = products[code.toUpperCase()];
            document.getElementById("s1Brand").innerText = p.brand;
            document.getElementById("s2Brand").innerText = p.brand;
            document.getElementById("displayCode").innerText = code.toUpperCase();
        } else {
            document.getElementById("displayCode").innerText = "SCAN QR CODE";
        }
    };

    function openPortal() {
        document.getElementById("verifiedScreen").style.display = "none";
        document.getElementById("portalScreen").style.display = "block";
    }

    function verifyProduct() {
        let input = document.getElementById("verifyInput");
        let code = input.value.trim().toUpperCase();
        if (products[code]) {
            document.getElementById("finalBrand").innerText = products[code].brand;
            document.getElementById("successPopup").style.display = "flex";
        } else {
            document.getElementById("resultBox").innerText = "❌ INVALID CODE";
            document.getElementById("resultBox").style.color = "red";
        }
    }
</script>
</body>
</html>
