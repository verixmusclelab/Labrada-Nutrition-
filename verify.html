<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
}

/* SCREENS */

#verifiedScreen{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

#portalScreen{
min-height:100vh;
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

/* CARD */

.card{
background:#111;
padding:30px;
border-radius:25px;
width:100%;
max-width:400px;
text-align:center;
border:2px solid #ffcc00;
box-shadow:0 0 20px rgba(255,204,0,0.25);
}

/* BRAND */

.brand{
font-size:34px;
font-weight:900;
color:#ffcc00;
margin-bottom:20px;
line-height:1.2;
text-transform:uppercase;
}

/* VERIFIED */

.verify-text{
color:#00ff00;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

/* BUTTON */

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ffcc00;
font-weight:bold;
font-size:15px;
cursor:pointer;
margin-top:15px;
}

/* CODE BOX */

.code-box{
background:#181818;
border:2px dashed #ffcc00;
padding:20px;
border-radius:15px;
margin:20px 0;
}

/* INPUT */

.verify-input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
outline:none;
font-size:16px;
text-align:center;
margin-top:10px;
}

/* RESULT */

#resultBox{
margin-top:20px;
font-weight:bold;
font-size:18px;
min-height:40px;
}

</style>

</head>

<body>

<!-- FIRST SCREEN -->

<div id="verifiedScreen">

<div class="card">

<div class="brand"
id="screenBrand">
AUTHENTIC PRODUCT
</div>

<div style="font-size:65px;">
✅
</div>

<div class="verify-text">
PRODUCT VERIFIED
</div>

<button class="btn"
onclick="openPortal()">
OPEN WEBSITE
</button>

</div>

</div>

<!-- PORTAL -->

<div id="portalScreen">

<div class="card">

<div class="brand"
id="portalBrand">
BRAND NAME
</div>

<div class="code-box">

<div style="
font-size:13px;
color:#888;">
MANUAL VERIFICATION CODE
</div>

<div id="displayCode"
style="
font-size:30px;
font-weight:bold;
color:#00ff00;
margin-top:10px;">
---
</div>

</div>

<input type="text"
id="verifyInput"
class="verify-input"
placeholder="ENTER PRODUCT CODE">

<button class="btn"
onclick="verifyProduct()">
VERIFY PRODUCT
</button>

<div id="resultBox"></div>

</div>

</div>

<script>

/* =========================
ALL PRODUCTS + ALL CODES
========================= */

const products = {

/* LABRADA */

"LBRA7X9K1":{brand:"LABRADA NUTRITION"},
"LBRB4M2Q8":{brand:"LABRADA NUTRITION"},
"LBRC8P5T3":{brand:"LABRADA NUTRITION"},
"LBRD1W7Y6":{brand:"LABRADA NUTRITION"},
"LBRE9K3N2":{brand:"LABRADA NUTRITION"},
"LBRF6R8C4":{brand:"LABRADA NUTRITION"},
"LBRG2V5B7":{brand:"LABRADA NUTRITION"},
"LBRH7T1L9":{brand:"LABRADA NUTRITION"},
"LBRJ3X6P5":{brand:"LABRADA NUTRITION"},
"LBRK8Q2D1":{brand:"LABRADA NUTRITION"},

/* MUSCLETECH */

"TRU5MP91":{brand:"MUSCLETECH"},
"PRE9W7K2":{brand:"MUSCLETECH"},
"MTX7P9Q2":{brand:"MUSCLETECH"},

/* ON */

"ON84P2X":{brand:"OPTIMUM NUTRITION"},
"ONX7K2P5":{brand:"OPTIMUM NUTRITION"},

/* GNC */

"GNC3M78B":{brand:"GNC"},
"MUL4V8T1":{brand:"GNC"},

/* WELLCORE */

"WEL7C91X":{brand:"WELLCORE"},

/* MUSCLEBLAZE */

"MBX7P2K9":{brand:"MUSCLEBLAZE"},

/* AVVATAR */

"AVV7P9K2":{brand:"AVVATAR"},

/* BIGMUSCLES */

"BIG7P2K8":{brand:"BIGMUSCLES"}

};

/* =========================
QR AUTO DETECT
========================= */

window.onload = function(){

const params =
new URLSearchParams(
window.location.search
);

const code =
params.get("code");

/* VALID QR */

if(
code &&
products[code.toUpperCase()]
){

let p =
products[code.toUpperCase()];

/* TOP SCREEN BRAND */

document.getElementById(
"screenBrand"
).innerText =
p.brand;

/* PORTAL BRAND */

document.getElementById(
"portalBrand"
).innerText =
p.brand;

/* MANUAL CODE */

document.getElementById(
"displayCode"
).innerText =
code.toUpperCase();

}

/* INVALID QR */

else{

document.getElementById(
"screenBrand"
).innerText =
"INVALID PRODUCT QR";

}

};

/* =========================
OPEN WEBSITE
========================= */

function openPortal(){

document.getElementById(
"verifiedScreen"
).style.display =
"none";

document.getElementById(
"portalScreen"
).style.display =
"flex";

}

/* =========================
VERIFY PRODUCT
========================= */

function verifyProduct(){

let input =
document.getElementById(
"verifyInput"
);

let code =
input.value
.trim()
.toUpperCase();

let box =
document.getElementById(
"resultBox"
);

/* VALID */

if(products[code]){

let used =
parseInt(
localStorage.getItem(
"used_"+code
)
) || 0;

/* ALREADY USED */

if(used >= 2){

box.innerHTML =
"⚠️ ALREADY USED";

box.style.color =
"#ffcc00";

}

/* VERIFIED */

else{

used++;

localStorage.setItem(
"used_"+code,
used
);

box.innerHTML =
"✅ VERIFIED<br>" +
products[code].brand +
"<br>Usage: " +
used +
"/2";

box.style.color =
"#00ff00";

}

}

/* INVALID */

else{

box.innerHTML =
"❌ INVALID CODE";

box.style.color =
"red";

}

/* AUTO CLEAR */

input.value = "";

/* AUTO FOCUS */

input.focus();

}

</script>

</body>
</html>
