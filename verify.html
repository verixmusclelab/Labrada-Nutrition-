<meta charset="UTF-8">

<title>Product Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
}

/* SCAN SCREEN + PORTAL */
#verifiedScreen,
#portalScreen{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CARD */
.card{
background:#111;
padding:30px;
border-radius:25px;
width:100%;
max-width:400px;
text-align:center;
border:2px solid #ffcc00;
box-shadow:0 0 20px rgba(255,204,0,0.2);
}

/* BRAND */
.brand{
font-size:34px;
font-weight:900;
color:#ffcc00;
margin-bottom:20px;
line-height:1.2;
text-transform:uppercase;
}

/* VERIFY TEXT */
.verify-text{
color:#00ff00;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ffcc00;
font-weight:bold;
font-size:15px;
cursor:pointer;
margin-top:15px;
}

/* CODE BOX */
.code-box{
background:#181818;
border:2px dashed #ffcc00;
padding:20px;
border-radius:15px;
margin:20px 0;
}

/* INPUT */
.verify-input{
width:100%;
padding:15px;
border-radius:12px;
border:none;
outline:none;
font-size:16px;
text-align:center;
margin-top:10px;
}

/* RESULT */
#resultBox{
margin-top:20px;
font-weight:bold;
font-size:18px;
min-height:40px;
}

</style>
</head>

<div class="brand" id="screenBrand">
LABRADA NUTRITION
</div>

<button class="btn" onclick="openPortal()">

</button>

</div>

</div>

color:#00ff00;
margin-top:10px;

</div>

<input type="text"
id="verifyInput"
class="verify-input"
placeholder="ENTER PRODUCT CODE">

/* QR AUTO DETECT */

window.onload = function(){

const params = new URLSearchParams(window.location.search);

const code = params.get("code");

if(code && products[code.toUpperCase()]){

let p = products[code.toUpperCase()];

/* SCAN SCREEN BRAND */
document.getElementById("screenBrand").innerText = p.brand;

/* PORTAL BRAND */
document.getElementById("portalBrand").innerText = p.brand;

/* CODE SHOW */
document.getElementById("displayCode").innerText =
code.toUpperCase();

}

};

/* OPEN WEBSITE */

function openPortal(){

document.getElementById("verifiedScreen").style.display="none";

document.getElementById("portalScreen").style.display="flex";

}

/* VERIFY */

function verifyProduct(){

let input =
document.getElementById("verifyInput");

let code =
input.value.trim().toUpperCase();

let box =
document.getElementById("resultBox");

/* VALID CODE */

if(products[code]){

let used =
parseInt(localStorage.getItem("used_"+code))
|| 0;

/* LIMIT REACHED */

if(used >= 2){

box.innerHTML =
"⚠️ ALREADY USED";

box.style.color =
"#ffcc00";

}

/* VERIFY SUCCESS */

else{

used++;

localStorage.setItem(
"used_"+code,
used
);

box.innerHTML =
"✅ VERIFIED<br>" +
products[code].brand +
"<br>Usage: " +
used +
"/2";

box.style.color =
"#00ff00";

}

}

/* INVALID */

else{

box.innerHTML =
"❌ INVALID CODE";

box.style.color =
"red";

}

/* AUTO CLEAR */

input.value = "";

/* AUTO FOCUS */

input.focus();

}
