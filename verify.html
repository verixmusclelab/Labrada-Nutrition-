<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Product Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
}

/* VERIFIED SCREEN */

#verifiedScreen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.verify-card{
background:#111;
padding:40px 25px;
border-radius:30px;
width:100%;
max-width:430px;
text-align:center;
border:3px solid #00ff00;
box-shadow:0 0 30px rgba(0,255,0,.25);
}

.brand-name{
font-size:34px;
font-weight:bold;
color:#ffcc00;
margin-bottom:15px;
}

.icon{
font-size:70px;
margin-bottom:15px;
}

.verify-title{
font-size:30px;
font-weight:bold;
color:#00ff00;
margin-bottom:12px;
}

.verify-msg{
font-size:18px;
color:#ddd;
margin-bottom:25px;
}

.open-btn{
background:#ffcc00;
color:black;
border:none;
padding:16px;
width:100%;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* PORTAL SCREEN */

#portalScreen{
display:none;
padding:30px 20px;
min-height:100vh;
}

.portal-card{
max-width:500px;
margin:auto;
background:#111;
padding:35px 25px;
border-radius:30px;
border:2px solid #ffcc00;
text-align:center;
}

.portal-brand{
font-size:36px;
font-weight:bold;
color:#ffcc00;
margin-bottom:10px;
}

.portal-product{
font-size:26px;
margin-bottom:10px;
font-weight:bold;
}

.portal-sub{
color:#bbb;
margin-bottom:25px;
font-size:17px;
}

.code-box{
background:#181818;
border:2px dashed #ffcc00;
padding:20px;
border-radius:20px;
margin-bottom:25px;
}

.code-title{
font-size:18px;
margin-bottom:10px;
}

.code{
font-size:28px;
font-weight:bold;
letter-spacing:2px;
color:#00ff00;
}

.verify-input{
width:100%;
padding:16px;
border:none;
border-radius:15px;
font-size:18px;
margin-bottom:15px;
text-align:center;
}

.verify-btn{
width:100%;
padding:16px;
border:none;
border-radius:15px;
background:#ffcc00;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#resultBox{
display:none;
margin-top:20px;
padding:20px;
border-radius:20px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<!-- VERIFIED SCREEN -->

<div id="verifiedScreen">

LBR7F29K

</div>

<input
type="text"
id="verifyInput"

placeholder="Enter Product Code">

<button
class="verify-btn"
onclick="verifyProduct()">

VERIFY PRODUCT
