<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verification Portal</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0b0b0b;color:#fff}

/* Popup */
#verifiedScreen{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:1000;
}

.popup-card{
background:#111;
padding:25px;
border-radius:18px;
text-align:center;
width:90%;
max-width:360px;
border:2px solid #ffcc00;
}

.popup-brand{color:#ffcc00;font-size:22px;font-weight:bold}
.popup-status{color:#00ff00;font-size:18px;margin-top:10px}
.popup-msg{color:#ccc;margin:10px 0}
button{cursor:pointer}

/* Portal */
.card{
max-width:400px;
margin:80px auto;
background:#111;
padding:25px;
border-radius:15px;
border:2px solid #ffcc00;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
text-align:center;
}

.btn{
width:100%;
padding:12px;
background:#ffcc00;
border:none;
font-weight:bold;
}
</style>
</head>

<body>

<!-- POPUP -->
<div id="verifiedScreen">
  <div class="popup-card">
    <div class="popup-brand" id="popupBrand">BRAND</div>
    <div class="popup-status" id="popupStatus">PRODUCT VERIFIED SUCCESSFULLY</div>
    <div class="popup-msg" id="popupMsg">Your Product is Authentic</div>

    <button class="btn" onclick="openManual()">OPEN VERIFICATION PAGE</button>
    <button class="btn" style="margin-top:10px;background:#333;color:#fff"
            onclick="closePopup()">CLOSE</button>
  </div>
</div>

<!-- Verification -->
<div class="card">
  <h2>Verification</h2>
  <input id="verifyInput" placeholder="Enter Product Code">
  <button class="btn" onclick="verifyProduct()">VERIFY</button>
  <div id="resultBox"></div>
</div>

<script>
const products = {
  "LBR7F29K": { brand:"LABRADA NUTRITION", url:"https://example.com/labrada" },
  "TRU5MP91": { brand:"MUSCLETECH", url:"https://example.com/muscletech" },
  "ON84P2X": { brand:"OPTIMUM NUTRITION", url:"https://example.com/on" }
};

/* attempts storage */
function getAttempts(code){
  return Number(sessionStorage.getItem(code+"_attempts") || 0);
}

function setAttempts(code,val){
  sessionStorage.setItem(code+"_attempts",val);
}

function isBlocked(code){
  return sessionStorage.getItem(code+"_blocked") === "true";
}

function blockCode(code){
  sessionStorage.setItem(code+"_blocked","true");
}

/* VERIFY */
function verifyProduct(){
  let code = document.getElementById("verifyInput").value.trim().toUpperCase();
  let box = document.getElementById("resultBox");

  if(isBlocked(code)){
    box.innerHTML="❌ ALREADY USED / BLOCKED";
    box.style.color="red";
    return;
  }

  if(!products[code]){
    let a = getAttempts(code)+1;
    setAttempts(code,a);

    if(a>=3){
      blockCode(code);
      box.innerHTML="❌ FAILED - LIMIT EXCEEDED";
    }else{
      box.innerHTML=`❌ INVALID CODE (${a}/3)`;
    }
    box.style.color="red";
    return;
  }

  /* SUCCESS */
  let p = products[code];

  document.getElementById("popupBrand").innerText = p.brand;
  document.getElementById("popupMsg").innerText = "Your Product Verified";

  document.getElementById("verifiedScreen").style.display="flex";

  box.innerHTML="✅ VERIFIED";
  box.style.color="lime";
}

/* popup controls */
function closePopup(){
  document.getElementById("verifiedScreen").style.display="none";
}

function openManual(){
  let code = document.getElementById("verifyInput").value.trim().toUpperCase();
  if(products[code]){
    window.open(products[code].url,"_blank");
  }
}
</script>

</body>
</html>
