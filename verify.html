<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Portal</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#0b0b0b; color:white; }
        
        /* FIRST PAGE POPUP */
        #page1 { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:9999; }
        .popup-card { background:#111; padding:25px; border-radius:15px; border:2px solid #333; text-align:center; width:90%; max-width:300px; box-shadow: 0 0 15px #00ff00; }
        
        /* SECOND PAGE PORTAL */
        #page2 { display:block; padding:20px; text-align:center; min-height:100vh; display:flex; justify-content:center; align-items:center; }
        .portal-card { background:#111; padding:25px; border-radius:15px; border:2px solid #ffcc00; width:100%; max-width:400px; }
        .input-box { width:100%; padding:12px; margin:10px 0; border-radius:5px; border:none; text-align:center; }
        .btn { width:100%; padding:12px; background:#ffcc00; border:none; border-radius:5px; font-weight:bold; cursor:pointer; }
        #statusBox { margin-top:15px; padding:10px; border-radius:5px; display:none; font-weight:bold; }
    </style>
</head>
<body>

<!-- PAGE 1: POPUP -->
<div id="page1">
    <div class="popup-card">
        <h2 id="popupBrand" style="color:#ffcc00;">BRAND NAME</h2>
        <div style="font-size:50px; margin:10px 0;">✅</div>
        <p style="color:#0f0; font-weight:bold;">PRODUCT VERIFIED SUCCESSFULLY</p>
        <p style="font-size:12px; color:#aaa; margin-top:5px;">100% Authentic Product</p>
        <button class="btn" style="margin-top:15px;" onclick="closePopup()">Close</button>
    </div>
</div>

<!-- PAGE 2: PORTAL -->
<div id="page2">
    <div class="portal-card">
        <h2 id="portalBrand" style="color:#ffcc00; margin-bottom:15px;">AUTHENTICATION PORTAL</h2>
        <div style="border:1px dashed #555; padding:10px; margin-bottom:15px;">
            <p style="font-size:10px; color:#888;">MANUAL VERIFICATION CODE</p>
            <h3 id="displayCode" style="color:#0f0; margin-top:5px;">---</h3>
        </div>
        <input type="text" id="verifyInput" class="input-box" placeholder="Enter Product Code">
        <button class="btn" onclick="checkCode()">VERIFY PRODUCT</button>
        <div id="statusBox"></div>
    </div>
</div>

<script>
    const db = {
        "ON84P2X": "OPTIMUM NUTRITION",
        "LBR7F29K": "LABRADA NUTRITION"
    };
    for(let i = 1; i <= 100; i++) { db["LBR-" + (1000 + i)] = "LABRADA NUTRITION"; }

    function closePopup() { document.getElementById('page1').style.display = 'none'; }

    function checkCode() {
        let inputField = document.getElementById('verifyInput');
        let code = inputField.value.trim().toUpperCase();
        let box = document.getElementById('statusBox');
        
        box.style.display = 'block';

        if (!db[code]) {
            box.style.background = "#400"; box.style.color = "red";
            box.innerHTML = "❌ INVALID CODE";
        } else {
            let count = parseInt(localStorage.getItem("use_" + code)) || 0;
            if (count < 3) {
                count++;
                localStorage.setItem("use_" + code, count);
                box.style.background = "#020"; box.style.color = "#0f0";
                box.innerHTML = "✅ " + db[code] + "<br>Thanks for choosing " + db[code] + "!<br>Verification: " + count + "/3";
            } else {
                box.style.background = "#420"; box.style.color = "#ff0";
                box.innerHTML = "⚠️ ALREADY USED (3/3)";
            }
        }
        
        // YAHAN HOTA HAI INPUT BOX CLEAR
        inputField.value = ""; 
    }

    window.onload = () => {
        let code = new URLSearchParams(window.location.search).get("code")?.toUpperCase();
        if(code && db[code]) {
            document.getElementById('popupBrand').innerText = db[code];
            document.getElementById('portalBrand').innerText = db[code];
            document.getElementById('displayCode').innerText = code;
            document.getElementById('verifyInput').value = code;
            document.getElementById('page1').style.display = 'flex';
        }
    }
</script>
</body>
</html>
