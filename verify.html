<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Verification</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
min-height:100vh;
}

/* VERIFIED SCREEN */

#verifiedScreen{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.verify-card{
background:#111;
padding:40px 25px;
border-radius:30px;
width:100%;
max-width:430px;
text-align:center;
border:3px solid #00ff00;
box-shadow:0 0 30px rgba(0,255,0,.25);
}

.brand-name{
font-size:34px;
font-weight:bold;
color:#ffcc00;
margin-bottom:15px;
}

.icon{
font-size:70px;
margin-bottom:15px;
}

.verify-title{
font-size:30px;
font-weight:bold;
color:#00ff00;
margin-bottom:12px;
}

.verify-msg{
font-size:18px;
color:#ddd;
margin-bottom:25px;
}

.open-btn{
background:#ffcc00;
color:black;
border:none;
padding:16px;
width:100%;
border-radius:14px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

/* PORTAL */

#portalScreen{
display:none;
padding:30px 20px;
min-height:100vh;
}

.portal-card{
max-width:520px;
margin:auto;
background:#111;
padding:35px 25px;
border-radius:30px;
border:2px solid #ffcc00;
text-align:center;
}

.portal-brand{
font-size:36px;
font-weight:bold;
color:#ffcc00;
margin-bottom:10px;
}

.portal-product{
font-size:25px;
font-weight:bold;
margin-bottom:8px;
}

.portal-sub{
color:#bbb;
margin-bottom:20px;
}

.batch-box{
background:#181818;
padding:16px;
border-radius:15px;
margin-bottom:15px;
border:1px solid #333;
}

.batch-title{
font-size:14px;
color:#aaa;
}

.batch-number{
font-size:22px;
font-weight:bold;
color:#00ff00;
}

.verify-input{
width:100%;
padding:16px;
border:none;
border-radius:14px;
font-size:18px;
margin-bottom:15px;
text-align:center;
}

.verify-btn{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#ffcc00;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#resultBox{
display:none;
margin-top:20px;
padding:20px;
border-radius:20px;
font-size:22px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="verifiedScreen">

<div class="verify-card">

<div class="brand-name" id="verifiedBrand">
LABRADA NUTRITION
</div>

<div class="icon">✅</div>

<div class="verify-title">
PRODUCT VERIFIED
</div>

<div class="verify-msg">
100% Authentic Product
</div>

<button class="open-btn" onclick="openPortal()">
OPEN WEBSITE
</button>

</div>
</div>

<div id="portalScreen">

<div class="portal-card">

<div class="portal-brand" id="portalBrand">
LABRADA NUTRITION
</div>

<div class="portal-product" id="portalProduct">
WHEY PROTEIN AUTHENTICATION PORTAL
</div>

<div class="portal-sub">
Please Enter Your Product Verification Code
</div>

<div class="batch-box">
<div class="batch-title">
BATCH NUMBER
</div>

<div class="batch-number" id="batchNo">
LW2401
</div>
</div>

<input
type="text"
id="verifyInput"
class="verify-input"
placeholder="Enter Product Code">

<button
class="verify-btn"
onclick="verifyProduct()">
VERIFY PRODUCT
</button>

<div id="resultBox"></div>

</div>
</div>

<script>

const products={

"LBR-A91X7K":{
brand:"LABRADA NUTRITION",
product:"WHEY PROTEIN",
batch:"LW2401"
},

"LMG-A71P9X":{
brand:"LABRADA NUTRITION",
product:"MASS GAINER",
batch:"LG2401"
},

"MST-A44P8Q":{
brand:"MUSCLETECH",
product:"NITRO TECH",
batch:"MT2401"
},

"PRE-A72Q8L":{
brand:"MUSCLETECH",
product:"PRE WORKOUT",
batch:"PW2401"
},

"ON-A91T5Q":{
brand:"OPTIMUM NUTRITION",
product:"GOLD STANDARD WHEY",
batch:"ON2401"
},

"GNC-A11P8Q":{
brand:"GNC",
product:"CREATINE",
batch:"GC2401"
},

"MUL-A91Q4L":{
brand:"GNC",
product:"MULTIVITAMIN",
batch:"MV2401"
},

"FIS-A72P8Q":{
brand:"MUSCLEBLAZE",
product:"FISH OIL",
batch:"FO2401"
}

};

let currentCode="";

/* QR LOAD */

window.onload=function(){

const params=
new URLSearchParams(
window.location.search
);

const code=
params.get("code");

if(
code &&
products[
code.toUpperCase()
]
){

currentCode=
code.toUpperCase();

let p=
products[currentCode];

document.getElementById(
"verifiedBrand"
).innerText=
p.brand;

document.getElementById(
"portalBrand"
).innerText=
p.brand;

document.getElementById(
"portalProduct"
).innerText=
p.product+
" AUTHENTICATION PORTAL";

document.getElementById(
"batchNo"
).innerText=
p.batch;

}

};

/* OPEN WEBSITE */

function openPortal(){

document.getElementById(
"verifiedScreen"
).style.display=
"none";

document.getElementById(
"portalScreen"
).style.display=
"block";

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* VERIFY */

function verifyProduct(){

let input=
document.getElementById(
"verifyInput"
);

let value=
input.value
.trim()
.toUpperCase();

let result=
document.getElementById(
"resultBox"
);

result.style.display=
"block";

if(
value===currentCode
){

let key=
"verify_"+
currentCode;

let count=
parseInt(
localStorage.getItem(
key
)
)||0;

count++;

localStorage.setItem(
key,
count
);

if(count<=3){

result.innerHTML=
"✅ PRODUCT VERIFIED<br><br>Batch: "+
products[currentCode]
.batch+
"<br><br>Verification Count: "
+count+"/3";

result.style.background=
"#002b00";

result.style.color=
"#00ff00";

result.style.border=
"2px solid #00ff00";

}

else{

result.innerHTML=
"⚠ CODE USED TOO MANY TIMES<br><br>Batch: "
+
products[currentCode]
.batch;

result.style.background=
"#2b0000";

result.style.color=
"#ffcc00";

result.style.border=
"2px solid #ffcc00";

}

}

else{

result.innerHTML=
"❌ PRODUCT FAILED";

result.style.background=
"#2b0000";

result.style.color=
"red";

result.style.border=
"2px solid red";

}

input.value="";

}
</script>

</body>
</html>
