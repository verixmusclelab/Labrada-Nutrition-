<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Brother's Fitness Supplement Store</title>
    <style>
        /* Premium Dark Gym Theme Base */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            padding-bottom: 40px;
        }

        header {
            background: #000000;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ffcc00;
        }

        header h1 {
            color: #ffcc00;
            margin: 0;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* AUTO-VERIFICATION SCREEN (Sirf code checking ke time dikhega) */
        #verification-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d0d0d;
            z-index: 99999;
            display: none; /* By default hidden rahega */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #1a1a1a;
            border-top: 4px solid #ffcc00;
            border-radius: 50%;
            margin-bottom: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Navigation Tabs */
        .category-nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px auto;
            padding: 0 20px;
            max-width: 1200px;
            box-sizing: border-box;
            flex-wrap: wrap;
        }

        .category-btn {
            background: #1a1a1a;
            color: #ffffff;
            border: 2px solid #333;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .category-btn:hover, .category-btn.active {
            background: #ffcc00;
            color: #000000;
            border-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }

        /* Catalog Layout Base */
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-section { display: none; }
        .active-section { display: grid !important; }

        .supplement-card {
            background: #141414;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
        }

        .image-container {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            background: #1f1f1f;
            border-radius: 8px;
            padding: 10px;
        }

        .supplement-card img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .supplement-card h2 { font-size: 19px; margin: 10px 0; color: #ffffff; }
        .price { font-size: 22px; font-weight: bold; color: #ffcc00; margin: 15px 0; }

        .buy-btn {
            background: #ffcc00;
            color: #000000;
            text-decoration: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            display: block;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="verification-screen">
        <div class="spinner"></div>
        <h2 style="color: #ffcc00; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 10px 0;">Verifying Product</h2>
        <p style="color: #aaa; margin: 0;">Please wait, checking brand authenticity...</p>
    </div>

    <header>
        <h1>5 Brother's Fitness Supplement Store</h1>
    </header>

    <div class="category-nav">
        <button class="category-btn active" id="btn-whey" onclick="changeTab('whey')">Whey Protein</button>
        <button class="category-btn" id="btn-creatine" onclick="changeTab('creatine')">Creatine</button>
        <button class="category-btn" id="btn-gainer" onclick="changeTab('gainer')">Gainer</button>
    </div>

    <section id="whey" class="catalog product-section active-section">
        <div class="supplement-card">
            <div class="image-container">
                <img src="https://i.ibb.co/ynbr1YCw/download-1.webp" alt="Muscletech">
            </div>
            <h2>Muscletech Whey Protein</h2>
            <p class="price">₹4800/-</p>
            <a href="tel:9990954574" class="buy-btn">Call to Buy</a>
        </div>
    </section>

    <section id="creatine" class="catalog product-section">
        <div class="supplement-card">
            <div class="image-container">
                <img src="https://i.ibb.co/MknmZg96/61-A7rff-N6-L-SL1500.jpg" alt="GNC Creatine">
            </div>
            <h2>GNC Creatine Monohydrate</h2>
            <p class="price">₹634/-</p>
            <a href="tel:9990954574" class="buy-btn">Call to Buy</a>
        </div>
    </section>

    <section id="gainer" class="catalog product-section">
        <div class="supplement-card">
            <div class="image-container">
                <img src="https://i.ibb.co/sJjstZh7/Gainer-Choc-1-K-Front-1200x.jpg" alt="Labrada Mass">
            </div>
            <h2>Labrada Mass Gainer</h2>
            <p class="price">₹3000/-</p>
            <a href="tel:9990954574" class="buy-btn">Call to Buy</a>
        </div>
    </section>

    <script>
        // Secure Database For Codes
        const secureDatabase = {
            "lbr7f29k": "whey",
            "tru5mp91": "whey",
            "la24x8q2": "whey",
            "mpn84k2l": "whey",
            "mbz9x14a": "creatine",
            "gnc3m78b": "creatine",
            "wel4c8t2": "creatine",
            "lmg5p62c": "gainer",
            "mon8k43d": "gainer"
        };

        function changeTab(tabId) {
            let buttons = document.getElementsByClassName('category-btn');
            for (let btn of buttons) { btn.classList.remove('active'); }
            
            let sections = document.getElementsByClassName('product-section');
            for (let sec of sections) { sec.classList.remove('active-section'); }
            
            if (tabId === 'whey') document.getElementById('btn-whey').classList.add('active');
            if (tabId === 'creatine') document.getElementById('btn-creatine').classList.add('active');
            if (tabId === 'gainer') document.getElementById('btn-gainer').classList.add('active');
            
            document.getElementById(tabId).classList.add('active-section');
        }

        // URL SCANNING AND DIRECT REDIRECTION LOGIC
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            let codeParam = urlParams.get('code');
            
            if (codeParam) {
                let code = codeParam.toLowerCase().trim();
                let verifyScreen = document.getElementById('verification-screen');
                
                // Show standard verification loader screen
                verifyScreen.style.display = 'flex';
                
                setTimeout(function() {
                    if (secureDatabase[code]) {
                        // Sahi code hote hi loader screen hide ho jayegi aur user direct main section par chala jayega
                        verifyScreen.style.display = 'none';
                        changeTab(secureDatabase[code]);
                    } else {
                        // Agar code galat hai toh loader hat jayega par home page dikhta rahega
                        verifyScreen.style.display = 'none';
                        alert("Security Alert: Invalid or Fake Brand Code Detected!");
                    }
                }, 1500); // 1.5 second ka loading window premium look ke liye
            }
        }
    </script>
</body>
</html>
